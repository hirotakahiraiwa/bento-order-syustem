databases:
  - name: bento-db
    plan: free

services:
  - type: web
    name: bento-order-system
    runtime: node
    plan: free
    buildCommand: cd server && npm install && cd ../client && npm install --include=dev && npm run build
    startCommand: cd server && node index.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "4000"
      - key: JWT_SECRET
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: bento-db
          property: connectionString
