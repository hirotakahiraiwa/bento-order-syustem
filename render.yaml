services:
  - type: web
    name: bento-order-system
    runtime: node
    plan: free
    buildCommand: cd client && npm install --include=dev && npx vite build && cd ../server && npm install
    startCommand: cd server && node index.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "4000"
      - key: JWT_SECRET
        generateValue: true
